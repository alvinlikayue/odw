name: Check execution order of notebooks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check_execution_order:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
        topic: ["Accessing_Open_Data", "Signal_Processing", "Searches", "Parameter_Estimation"]

    steps:
    - run: |
        echo "Checking Day ${{ matrix.topic }} Tutorials on python ${{ matrix.python-version }}"
    - uses: actions/checkout@v4
    - name: Check execution order of notebooks
      run: |
        for file in Tutorials/${{ matrix.topic }}/*ipynb; do
            echo "Checking ${file}";
            if ! ./tests/check_execution_order.py -e "${file}"; then
                echo "::error file=${file},title=Error";
                exit 1;
            fi
        done

