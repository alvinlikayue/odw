name: Check spelling

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  spellcheck:

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: [3.12]
        topic: ["01_Accessing_Open_Data", "02_Generating_Waveforms", "03_Signal_Processing", "04_Searches", "05_Parameter_Estimation"]

    steps:
    - run: |
        echo "Spellchecking ${{ matrix.topic }} Tutorials on python ${{ matrix.python-version }}"
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Installing requirements
      run: |
        pip install -r requirements.txt
    - name: Spellchecking notebooks
      run: |
        for file in Tutorials/${{ matrix.topic }}/*ipynb; do
            echo "Checking ${file}";
            if ! ./tests/check_spelling.sh "${file}"; then
                echo "::error file=${file},title=Error";
                exit 1;
            fi
        done

  spellcheck_other_files:

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: [3.12]

    steps:
    - run: |
        echo "Spellchecking other files python ${{ matrix.python-version }}"
    - uses: actions/checkout@v4
    - uses: conda-incubator/setup-miniconda@v3
    - name: Installing requirements
      run: |
        conda env create -f environment.yml
    - name: Spellchecking other files
      run: |
        conda activate odw-py312
        codespell -I .dictionary.txt --skip="*.ipynb" .
